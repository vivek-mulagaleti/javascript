<!-- rock paper scissors game -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="
        playGame('rock',);
        ">Rock</button>
    <button onclick="
        playGame('paper',);
      
        ">paper</button>
    <button onclick="
        playGame('scissors');
        ">scissors</button>

    <button onclick="
        score.wins=0;
        score.loses=0;
        score.ties=0;
        localStorage.removeItem('Score')
    "
    >Reset button</button>
    <script>
        // function that checks the computer move and player move.

        let score=JSON.parse(localStorage.getItem('Score')) ||  
            {
                wins: 0,
                loses: 0,
                ties: 0
            };

        function playGame(playermove) {

            const result = pickRandomNumber(); // calling the function to get computer move

            let result1;

            if (playermove === 'scissors') {
                if (result === 'rock'){
                    result1='lose';
                }
                else if (result === 'paper'){
                    result1='win';
            }
                else{
                    result1='tie';
                }
            }


            else if (playermove === 'paper') {
                if (result === 'rock'){
                    result1='win';
                }
                else if (result === 'paper'){
                    result1='tie';
                }
                else{
                    result1='lose';
                }
            }


            else {
                if (result === 'rock'){
                    result1='tie';
                }
                else if (result === 'paper'){
                    result1='lose';
                }
                else{
                    result1='win';
                }
            }


            if(result1==='win'){
                score.wins+=1;
            }
            else if(result1==='tie'){
                score.ties+=1
            }
            else{
                score.loses+=1;
            }
            alert(`your choice is ${playermove} and computer choice is ${result} You ${result1} Wins:${score.wins},loses:${score.loses},tie:${score.ties}`);
            



            localStorage.setItem('Score', JSON.stringify(score));
        }



        // function to get computer move
        function pickRandomNumber() {
            let result;
            const randomNumber = Math.random();
            if (randomNumber >= 0 && randomNumber <= 1 / 3) {
                result = 'rock';
            }
            else if (randomNumber <= 2 / 3)
                result = 'paper';
            else
                result = 'scissors';

            return result;
        }

    </script>
</body>

</html>
